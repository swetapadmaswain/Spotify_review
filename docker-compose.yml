version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: spotify_reviews_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spotify_reviews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify_reviews_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/spotify_reviews
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
